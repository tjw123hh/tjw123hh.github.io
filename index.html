        <script>

        <button class="about-x" onclick="about_x()">x</button>
    </body>
    <script src="jquery-3.6.0.min.js"></script>
    <script type="text/javascript">
        $(function(){
            function footerPosition(){
                $(".footer").removeClass("fixed-bottom");
                var contentHeight = document.body.scrollHeight,//网页正文全文高度
                    winHeight = window.innerHeight;//可视窗口高度，不包括浏览器顶部工具栏
                if(!((contentHeight + 120 + $(".footer").outerHeight(true)) > winHeight)){
                    //当网页正文高度大于可视窗口高度时，为footer添加类fixed-bottom
                    $(".footer").addClass("fixed-bottom");
                } else {
                    $(".footer").removeClass("fixed-bottom");
                }
            }
            footerPosition();
            $(window).resize(footerPosition);
        });
        function about() {
            $("img.black, p.about, button.about-x").show()
            setTimeout(() => $("img.black, p.about, button.about-x").css("opacity","1"), 100)
        };
        function about_x() {
            $("img.black, p.about, button.about-x").css("opacity","0")
            setTimeout(() => $("img.black, p.about, button.about-x").hide(), 500)
        };
    </script>
